<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #fafaf8;
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            width: 100%;
            max-width: 440px;
        }

        /* Header */
        .auth-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }

        .auth-header p {
            font-size: 1rem;
            color: #52524a;
            font-weight: 300;
        }

        /* Form */
        .auth-form {
            background: #ffffff;
            border: 1px solid #e0dfd8;
            border-radius: 1.5rem;
            padding: 3rem 2.5rem;
            margin-bottom: 1.5rem;
        }

        .form-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 2rem;
            text-align: center;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 1rem;
            border: 1px solid #e0dfd8;
            border-radius: 0.75rem;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
            background: #fafaf8;
        }

        .form-group input:focus {
            outline: none;
            border-color: #8a8a82;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(138, 138, 130, 0.08);
        }

        .form-group input::placeholder {
            color: #8a8a82;
        }

        /* Checkbox */
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
        }

        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #1a1a1a;
        }

        .checkbox-group label {
            font-size: 0.9rem;
            color: #52524a;
            font-weight: 400;
            text-transform: none;
            letter-spacing: normal;
            margin: 0;
            cursor: pointer;
        }

        /* Links */
        .form-links {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            margin-bottom: 2rem;
        }

        .forgot-link {
            color: #8a8a82;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .forgot-link:hover {
            color: #1a1a1a;
        }

        /* Buttons */
        .submit-btn {
            width: 100%;
            padding: 1.1rem;
            background: #1a1a1a;
            color: #ffffff;
            border: none;
            border-radius: 0.75rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 1.5rem;
        }

        .submit-btn:hover {
            background: #333333;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        /* Divider */
        .divider-section {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 2rem 0;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: #e0dfd8;
        }

        .divider-text {
            font-size: 0.85rem;
            color: #8a8a82;
            font-weight: 500;
        }

        /* Social Login */
        .social-login {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .social-btn {
            flex: 1;
            padding: 1rem;
            border: 1px solid #e0dfd8;
            background: #fafaf8;
            color: #1a1a1a;
            border-radius: 0.75rem;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .social-btn:hover {
            border-color: #8a8a82;
            background: #ffffff;
            transform: translateY(-2px);
        }

        /* Toggle Section */
        .auth-toggle {
            text-align: center;
            color: #52524a;
            font-size: 0.95rem;
        }

        .auth-toggle a {
            color: #1a1a1a;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .auth-toggle a:hover {
            color: #8a8a82;
        }

        /* Hidden form */
        .auth-form.hidden {
            display: none;
        }

        /* Footer */
        .auth-footer {
            text-align: center;
            margin-top: 2rem;
            color: #8a8a82;
            font-size: 0.85rem;
        }

        .auth-footer a {
            color: #1a1a1a;
            text-decoration: none;
            font-weight: 500;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .auth-form {
                padding: 2rem 1.5rem;
            }

            .form-title {
                font-size: 1.5rem;
            }

            .logo {
                font-size: 1.5rem;
            }

            .container {
                max-width: 100%;
            }
        }

        /* Error message */
        .error-message {
            background: #ffe0e0;
            color: #d0403a;
            padding: 1rem;
            border-radius: 0.75rem;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        /* Success message */
        .success-message {
            background: #e0f5e0;
            color: #2d7d2d;
            padding: 1rem;
            border-radius: 0.75rem;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            display: none;
        }

        .success-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="auth-header">
            <div class="logo">Visual Stories</div>
            <p>Photography Portfolio & Community</p>
        </div>

        <!-- Sign In Form -->
        <form class="auth-form" id="signInForm" onsubmit="handleSignIn(event)">
            <div class="error-message" id="signInError"></div>
            <div class="success-message" id="signInSuccess"></div>

            <h2 class="form-title">Welcome Back</h2>

            <div class="form-group">
                <label for="signInEmail">Email Address</label>
                <input 
                    type="email" 
                    id="signInEmail" 
                    placeholder="you@example.com" 
                    required
                >
            </div>

            <div class="form-group">
                <label for="signInPassword">Password</label>
                <input 
                    type="password" 
                    id="signInPassword" 
                    placeholder="••••••••" 
                    required
                >
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="rememberMe">
                <label for="rememberMe">Remember me</label>
            </div>

            <div class="form-links">
                <span></span>
                <a href="#" class="forgot-link" onclick="alert('Password reset link would be sent to your email')">Forgot password?</a>
            </div>

            <button type="submit" class="submit-btn">Sign In</button>

            <div class="divider-section">
                <div class="divider-line"></div>
                <div class="divider-text">or</div>
                <div class="divider-line"></div>
            </div>

            <div class="social-login">
                <button type="button" class="social-btn" onclick="handleSocialLogin('google')">📷</button>
                <button type="button" class="social-btn" onclick="handleSocialLogin('twitter')">𝕏</button>
                <button type="button" class="social-btn" onclick="handleSocialLogin('facebook')">f</button>
            </div>

            <div class="auth-toggle">
                Don't have an account? <a onclick="toggleForm()">Sign Up</a>
            </div>
        </form>

        <!-- Sign Up Form -->
        <form class="auth-form hidden" id="signUpForm" onsubmit="handleSignUp(event)">
            <div class="error-message" id="signUpError"></div>
            <div class="success-message" id="signUpSuccess"></div>

            <h2 class="form-title">Join Our Community</h2>

            <div class="form-group">
                <label for="signUpName">Full Name</label>
                <input 
                    type="text" 
                    id="signUpName" 
                    placeholder="Your name" 
                    required
                >
            </div>

            <div class="form-group">
                <label for="signUpEmail">Email Address</label>
                <input 
                    type="email" 
                    id="signUpEmail" 
                    placeholder="you@example.com" 
                    required
                >
            </div>

            <div class="form-group">
                <label for="signUpPassword">Password</label>
                <input 
                    type="password" 
                    id="signUpPassword" 
                    placeholder="••••••••" 
                    required
                >
            </div>

            <div class="form-group">
                <label for="signUpConfirm">Confirm Password</label>
                <input 
                    type="password" 
                    id="signUpConfirm" 
                    placeholder="••••••••" 
                    required
                >
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="agreeTerms" required>
                <label for="agreeTerms">I agree to the <a href="#" style="color: #1a1a1a; font-weight: 600;">Terms & Conditions</a></label>
            </div>

            <button type="submit" class="submit-btn">Create Account</button>

            <div class="divider-section">
                <div class="divider-line"></div>
                <div class="divider-text">or</div>
                <div class="divider-line"></div>
            </div>

            <div class="social-login">
                <button type="button" class="social-btn" onclick="handleSocialLogin('google')">📷</button>
                <button type="button" class="social-btn" onclick="handleSocialLogin('twitter')">𝕏</button>
                <button type="button" class="social-btn" onclick="handleSocialLogin('facebook')">f</button>
            </div>

            <div class="auth-toggle">
                Already have an account? <a onclick="toggleForm()">Sign In</a>
            </div>
        </form>

        <!-- Footer -->
        <div class="auth-footer">
            <p>© 2024 Visual Stories. <a href="photo-portfolio_V1.html">Back to Portfolio</a></p>
        </div>
    </div>

    <script>
        function toggleForm() {
            const signInForm = document.getElementById('signInForm');
            const signUpForm = document.getElementById('signUpForm');
            
            signInForm.classList.toggle('hidden');
            signUpForm.classList.toggle('hidden');

            // Clear messages
            document.getElementById('signInError').classList.remove('show');
            document.getElementById('signInSuccess').classList.remove('show');
            document.getElementById('signUpError').classList.remove('show');
            document.getElementById('signUpSuccess').classList.remove('show');

            // Clear form inputs
            signInForm.reset();
            signUpForm.reset();
        }

        function handleSignIn(event) {
            event.preventDefault();
            
            const email = document.getElementById('signInEmail').value;
            const password = document.getElementById('signInPassword').value;
            const rememberMe = document.getElementById('rememberMe').checked;

            // Basic validation
            if (!email || !password) {
                showError('signInError', 'Please fill in all fields');
                return;
            }

            // Simulate successful sign in
            showSuccess('signInSuccess', `Welcome back! Redirecting...`);
            
            setTimeout(() => {
                // In a real app, redirect to dashboard
                alert('Sign in successful! Redirecting to your dashboard...');
                // window.location.href = '/dashboard';
            }, 1500);
        }

        function handleSignUp(event) {
            event.preventDefault();
            
            const name = document.getElementById('signUpName').value;
            const email = document.getElementById('signUpEmail').value;
            const password = document.getElementById('signUpPassword').value;
            const confirm = document.getElementById('signUpConfirm').value;
            const agreeTerms = document.getElementById('agreeTerms').checked;

            // Validation
            if (!name || !email || !password || !confirm) {
                showError('signUpError', 'Please fill in all fields');
                return;
            }

            if (password !== confirm) {
                showError('signUpError', 'Passwords do not match');
                return;
            }

            if (password.length < 8) {
                showError('signUpError', 'Password must be at least 8 characters');
                return;
            }

            if (!agreeTerms) {
                showError('signUpError', 'Please agree to the terms and conditions');
                return;
            }

            // Simulate successful sign up
            showSuccess('signUpSuccess', 'Account created successfully! Redirecting...');
            
            setTimeout(() => {
                alert('Account created! A verification email has been sent.');
                // window.location.href = '/verify-email';
            }, 1500);
        }

        function handleSocialLogin(provider) {
            alert(`Sign in with ${provider.charAt(0).toUpperCase() + provider.slice(1)} - Connect your OAuth here`);
            // Implement actual OAuth integration
        }

        function showError(elementId, message) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.classList.add('show');
        }

        function showSuccess(elementId, message) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.classList.add('show');
        }

        // Allow Enter key to submit forms
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const activeForm = document.querySelector('.auth-form:not(.hidden)');
                if (activeForm) {
                    activeForm.dispatchEvent(new Event('submit'));
                }
            }
        });
    </script>
</body>
</html>
